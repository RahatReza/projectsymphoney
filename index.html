<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAHATIL | TIDAL CONVERGENCE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;400&display=swap');

        /* DOM/CANVAS SPLIT */
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            cursor: none;
            touch-action: none;
            -webkit-touch-callout: none;
            height: 100dvh;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            z-index: 1;
            filter: contrast(1.05);
        }

        /* SPECTRAL GLOW TOKENS */
        :root {
            --glow-1: rgba(180, 215, 255, 0.4);
            --glow-2: rgba(255, 250, 230, 0.45);
            --glow-3: rgba(140, 255, 240, 0.25);
            --glow-active: rgba(255, 255, 255, 0.8);
        }

        /* IMMERSION GATEWAY */
        #intro-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            transition: opacity 1.5s ease, backdrop-filter 1.5s ease;
            cursor: pointer;
        }

        .intro-visual {
            width: 80px;
            height: 80px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            position: relative;
            animation: visual-pulse 2s ease-in-out infinite;
            margin-bottom: 40px;
        }

        .intro-visual::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: sound-wave 1.5s ease-out infinite;
        }

        .intro-visual::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: sound-wave-outer 1.5s ease-out infinite;
            animation-delay: 0.3s;
        }

        @keyframes visual-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 255, 255, 0.1); }
        }

        @keyframes sound-wave {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        @keyframes sound-wave-outer {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        .intro-text {
            color: #fff;
            font-size: 0.7rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            animation: pulse-breath 2.5s infinite alternate ease-in-out;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            margin-bottom: 15px;
        }

        .intro-hint {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.55rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: hint-fade 3s ease-in-out infinite;
        }

        @keyframes pulse-breath {
            0% { opacity: 0.3; letter-spacing: 15px; }
            100% { opacity: 1; letter-spacing: 20px; }
        }

        @keyframes hint-fade {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* STANDARD UI */
        #ui-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            transition: opacity 1.2s ease;
        }

        .brand-text { text-align: center; }

        h1 {
            font-weight: 100;
            letter-spacing: 35px;
            color: rgba(255, 252, 248, 0.95);
            margin: 0;
            font-size: 3.2rem;
            text-transform: uppercase;
            background: linear-gradient(110deg, rgba(255, 252, 248, 0.7) 0%, rgba(160, 235, 255, 0.95) 25%, rgba(255, 255, 255, 1) 50%, rgba(180, 255, 240, 0.95) 75%, rgba(255, 252, 248, 0.7) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 8px 40px rgba(0, 0, 5, 0.6), 0 0 30px var(--glow-1);
            animation: spectral-flow 6s linear infinite;
        }

        @keyframes spectral-flow {
            0% { background-position: 200% center; text-shadow: 0 8px 40px rgba(0, 0, 5, 0.6), 0 0 25px var(--glow-1); }
            50% { text-shadow: 0 8px 50px rgba(0, 0, 10, 0.7), 0 0 45px var(--glow-2), 0 0 25px var(--glow-3); }
            100% { background-position: 0% center; text-shadow: 0 8px 40px rgba(0, 0, 5, 0.6), 0 0 25px var(--glow-1); }
        }

        .btn-init {
            margin-top: 80px;
            pointer-events: auto;
            cursor: pointer;
            color: rgba(255, 252, 248, 0.9);
            font-size: 0.7rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            background: linear-gradient(90deg, rgba(255, 252, 248, 0.5) 0%, rgba(140, 255, 240, 0.95) 30%, rgba(255, 255, 255, 1) 50%, rgba(180, 215, 255, 0.95) 70%, rgba(255, 252, 248, 0.5) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 15px rgba(0, 0, 8, 0.6), 0 0 15px var(--glow-3);
            animation: btn-glow-flow 4s linear infinite;
        }

        @keyframes btn-glow-flow {
            0% { background-position: 200% center; opacity: 0.6; text-shadow: 0 4px 15px rgba(0, 0, 8, 0.6), 0 0 10px var(--glow-3); }
            50% { opacity: 0.95; text-shadow: 0 4px 25px rgba(0, 0, 10, 0.7), 0 0 20px var(--glow-1), 0 0 10px var(--glow-2); }
            100% { background-position: 0% center; opacity: 0.6; text-shadow: 0 4px 15px rgba(0, 0, 8, 0.6), 0 0 10px var(--glow-3); }
        }

        .btn-init::after {
            content: ''; position: absolute; bottom: -10px; left: 25%; width: 50%; height: 1px; background: #fff; opacity: 0.2; transition: 0.4s;
        }

        .btn-init:hover {
            opacity: 1; letter-spacing: 20px; -webkit-text-fill-color: #fff; text-shadow: 0 0 40px var(--glow-active), 0 4px 20px rgba(0, 0, 0, 0.9); animation: none;
        }

        .btn-init:hover::after { width: 100%; left: 0; opacity: 1; }

        #swipe-hint {
            position: absolute; bottom: 12%; display: flex; flex-direction: column; align-items: center; opacity: 0; pointer-events: none; animation: hint-appear 2s ease forwards 2.5s;
        }

        .swipe-track { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent); margin-bottom: 10px; position: relative; }
        .swipe-dot { position: absolute; top: -1px; left: 0; width: 15px; height: 3px; border-radius: 2px; background: rgba(160, 235, 255, 0.95); box-shadow: 0 0 10px rgba(160, 235, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.5); animation: swipe-dot-move 2.5s ease-in-out infinite; }
        .swipe-text { color: rgba(255, 252, 248, 0.45); font-size: 0.55rem; letter-spacing: 6px; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8); }

        @keyframes swipe-dot-move {
            0% { left: 0%; opacity: 0; transform: translateX(-50%); }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { left: 100%; opacity: 0; transform: translateX(-50%); }
        }

        @keyframes hint-appear { to { opacity: 1; } }

        #cinematic-layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; gap: 20px; opacity: 0; transition: opacity 0.6s ease; width: 100%;
        }

        .cine-title { font-weight: 100; font-size: 2.2rem; color: rgba(255, 252, 248, 0.95); letter-spacing: 15px; text-transform: uppercase; text-shadow: 0 8px 35px rgba(0, 0, 10, 0.45), 0 0 30px rgba(220, 235, 255, 0.15); opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); text-align: center; }
        .cine-sub { font-size: 0.65rem; color: rgba(220, 225, 235, 0.85); letter-spacing: 12px; text-transform: uppercase; opacity: 0; transform: translateY(15px); transition: all 0.6s ease; text-align: center; text-shadow: 0 4px 15px rgba(0, 0, 5, 0.6); }

        #cinematic-layer.active { opacity: 1; }
        #cinematic-layer.active .cine-title { opacity: 1; transform: translateY(0); letter-spacing: 28px; transition-delay: 0.1s; }
        #cinematic-layer.active .cine-sub:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.4s; }
        #cinematic-layer.active .cine-sub:nth-child(3) { opacity: 1; transform: translateY(0); color: rgba(255, 252, 248, 0.95); transition-delay: 0.8s; }

        #cursor { position: fixed; pointer-events: none; z-index: 9999; width: 22px; height: 22px; border: 1.5px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); mix-blend-mode: difference; transition: transform 0.2s ease; }

        /* ENGINEERING OVERRIDE PANEL UI */
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9000; display: none; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); pointer-events: auto; }
        #auth-input { background: transparent; border: none; border-bottom: 1px solid #fff; color: #fff; font-family: 'Inter', sans-serif; font-size: 1.2rem; text-align: center; outline: none; letter-spacing: 5px; padding: 10px; width: 300px; }
        #auth-input::placeholder { color: rgba(255, 255, 255, 0.3); text-transform: uppercase; }
        .panel-box { background: rgba(10, 10, 15, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 30px; width: 400px; max-width: 90%; max-height: 85vh; overflow-y: auto; color: #fff; font-family: 'Inter', sans-serif; box-shadow: 0 0 40px rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; }
        .panel-box::-webkit-scrollbar { width: 6px; }
        .panel-box::-webkit-scrollbar-track { background: transparent; }
        .panel-box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        .panel-box h3 { margin: 0 0 5px 0; font-weight: 100; letter-spacing: 8px; text-transform: uppercase; font-size: 1.2rem; text-align: center; color: #aaa; }
        .slider-group { display: flex; flex-direction: column; gap: 5px; }
        .slider-group label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #888; display: flex; justify-content: space-between; }
        .slider-group span { color: #fff; }
        input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #fff; cursor: pointer; margin-top: -7px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255, 255, 255, 0.2); border-radius: 1px; }
        .text-input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; font-family: 'Inter', sans-serif; font-size: 0.75rem; padding: 8px; width: 100%; border-radius: 4px; box-sizing: border-box; outline: none; transition: 0.3s; margin-top: 4px; }
        .text-input:focus { border-color: rgba(255, 255, 255, 0.7); background: rgba(0, 0, 0, 0.6); }
        .panel-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn-panel { flex: 1; padding: 12px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; font-family: 'Inter'; font-size: 0.65rem; transition: 0.3s; }
        .btn-panel:hover { background: rgba(255, 255, 255, 0.2); }
        .btn-reset { color: #ffa0a0; border-color: rgba(255, 100, 100, 0.3); }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; letter-spacing: 18px; margin-left: 18px; }
            .btn-init { font-size: 0.6rem; letter-spacing: 10px; margin-top: 50px; }
            .btn-init:hover { letter-spacing: 12px; }
            .cine-title { font-size: 1.5rem; letter-spacing: 8px; }
            .cine-sub { font-size: 0.5rem; letter-spacing: 6px; }
            #cinematic-layer.active .cine-title { letter-spacing: 15px; }
        }
    </style>
</head>

<body>
    <div id="cursor"></div>
    <canvas id="v"></canvas>

    <div id="intro-layer" onclick="window.enterExperience()">
        <div class="intro-visual"></div>
        <div class="intro-text">Click to Begin</div>
        <div class="intro-hint">Enable Audio Experience</div>
    </div>

    <div id="ui-layer">
        <div class="brand-text">
            <h1 id="ui-mainTitle">RAHATIL</h1>
            <div class="btn-init" id="ui-btnText" onclick="engage()">Initialize</div>
        </div>
        
        <div id="swipe-hint">
            <div class="swipe-track"><div class="swipe-dot"></div></div>
            <div class="swipe-text">Swipe to explore</div>
        </div>
    </div>

    <div id="cinematic-layer">
        <div class="cine-title" id="ui-cineTitle">Welcome, Rahatil</div>
        <div class="cine-sub" id="ui-cineSub1">Calibrating Tidal Engine...</div>
        <div class="cine-sub" id="ui-cineSub2">Redirecting to Terminal</div>
    </div>

    <div id="auth-modal" class="overlay-layer">
        <input type="password" id="auth-input" placeholder="OVERRIDE CODE" autocomplete="off" />
    </div>

    <div id="custom-panel" class="overlay-layer">
        <div class="panel-box">
            <h3>Engine Override</h3>

            <div class="slider-group"><label>Wave Energy <span id="val-energy">2.2</span></label><input type="range" id="inp-energy" min="0" max="10" step="0.1" value="2.2"></div>
            <div class="slider-group"><label>Wave Height <span id="val-height">0.05</span></label><input type="range" id="inp-height" min="0" max="0.5" step="0.01" value="0.05"></div>
            <div class="slider-group"><label>Star Density <span id="val-stars">600</span></label><input type="range" id="inp-stars" min="100" max="1500" step="10" value="600"></div>
            <div class="slider-group"><label>Water Red <span id="val-r">0.01</span></label><input type="range" id="inp-r" min="0" max="1" step="0.01" value="0.01"></div>
            <div class="slider-group"><label>Water Green <span id="val-g">0.04</span></label><input type="range" id="inp-g" min="0" max="1" step="0.01" value="0.04"></div>
            <div class="slider-group"><label>Water Blue <span id="val-b">0.08</span></label><input type="range" id="inp-b" min="0" max="1" step="0.01" value="0.08"></div>

            <h3 style="margin-top: 15px; font-size: 1rem;">System Text & Links</h3>
            <div class="slider-group"><label>Main Title</label><input type="text" id="inp-mainTitle" class="text-input"></div>
            <div class="slider-group"><label>Button Action</label><input type="text" id="inp-btnText" class="text-input"></div>
            <div class="slider-group"><label>Cinematic Title</label><input type="text" id="inp-cineTitle" class="text-input"></div>
            <div class="slider-group"><label>Subtext 1</label><input type="text" id="inp-cineSub1" class="text-input"></div>
            <div class="slider-group"><label>Subtext 2</label><input type="text" id="inp-cineSub2" class="text-input"></div>
            <div class="slider-group"><label>Redirect URL</label><input type="text" id="inp-targetUrl" class="text-input"></div>

            <div class="panel-buttons">
                <button class="btn-panel btn-reset" onclick="resetAdminPanel()">Reset</button>
            </div>
            <div class="panel-buttons">
                <button class="btn-panel" onclick="closeAdminPanel()">Sync & Close</button>
            </div>
        </div>
    </div>

    <!-- GLSL SHADER (THE 12 PILLARS OPTIMIZED EDITION) -->
    <script id="fs" type="x-shader/x-fragment">#version 300 es
#ifdef GL_FRAGMENT_PRECISION_HIGH
precision highp float;
#else
precision mediump float;
#endif

out vec4 fragColor;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_mouse;
uniform float u_warp;
uniform float u_waveTime;

uniform vec3 u_waterColor;
uniform float u_waveEnergy;
uniform float u_waveHeight;
uniform float u_starDensity;
uniform float u_quality;

uniform float u_warmup; 
uniform float u_detailFade; 

#define PI 3.14159265359

const mat2 rotMicro = mat2(0.8, -0.6, 0.6, 0.8);
const mat2 rotCloud = mat2(1.6, 1.2, -1.2, 1.6);

float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
float noise(vec2 p) {
    vec2 i = floor(p); vec2 f = fract(p);
    vec2 u = f*f*(3.0-2.0*f);
    return mix(mix(hash(i), hash(i+vec2(1,0)), u.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
}

// Pillar 7: Procedural Cost Budgeting - Strict vectorized Gerstner waves
float GetWaterHeight(vec3 p, bool micro) {
    float t = u_waveTime;
    vec2 uv = p.xz * 0.75;
    
    // Pillar 2: Depth-Aware LOD. Flatten distant waves!
    float distLOD = 1.0 - smoothstep(60.0, 180.0, length(p.xz));
    
    // Smooth interaction suspension (avoids harsh branches)
    float detailMix = distLOD * u_detailFade * (1.0 - u_warmup);
    float nVal = micro ? noise(uv * 0.3 + t * 0.1) * detailMix : 0.5;
    
    vec3 dots = vec3(
        dot(uv, vec2(0.64018, 0.76822)) * 1.5 + t * 0.8,
        dot(uv, vec2(-0.78086, 0.62469)) * 2.8 - t * 1.2,
        dot(uv, vec2(0.19611, -0.98058)) * 5.0 + t * 1.5
    );
    
    vec3 sines = sin(dots) * 0.5 + 0.5;
    sines *= sines; 
    
    vec3 amps = vec3(1.5 * (0.85 + 0.3 * nVal), 0.8, 0.4) * u_waveHeight;
    float h = dot(sines, amps);
    
    // Pillar 11: Shader Branch Discipline (using step multiplication instead of branching deep FBM)
    float hqMask = step(0.7, u_quality) * distLOD;
    vec2 dots2 = vec2(
        dot(uv, vec2(-0.8137, -0.5812)) * 3.5 + t * 0.6,
        dot(uv, vec2(0.9486, -0.3162)) * 8.0 - t * 2.0
    );
    vec2 sines2 = sin(dots2) * 0.5 + 0.5;
    vec2 amps2 = vec2(0.25 * (0.8 + 0.4 * nVal), 0.15) * u_waveHeight * hqMask;
    h += dot(sines2 * sines2, amps2);

    if(micro) {
        vec2 uv1 = rotMicro * uv * 8.0;
        h += (noise(uv1 + t) * 0.5) * (u_waveHeight * 0.18) * hqMask * detailMix;
    }
    
    return h - (u_waveHeight * 0.5);
}

// Pillar 2: Depth-Aware LOD inside Normal Expansion
vec3 GetNormal(vec3 p, bool micro) {
    float dist = length(p.xz);
    // Widen sample distance on far pixels (natural AA + performance)
    float eVal = mix(0.02, 0.25, smoothstep(40.0, 200.0, dist));
    vec2 e = vec2(eVal, 0.0);
    
    bool doMicro = micro && (dist < 100.0); // Contextual early termination of details
    
    float h = GetWaterHeight(p, doMicro);
    float naturalY = 0.04 + (u_waveHeight * 0.4); 
    return normalize(vec3(
        h - GetWaterHeight(p - e.xyy, false), 
        naturalY, 
        h - GetWaterHeight(p - e.yyx, false)
    ));
}

vec3 GetStars(vec3 rd, float nightFactor, bool isRef) {
    vec3 starRd = isRef ? normalize(vec3(rd.x, abs(rd.y), rd.z)) : rd;
    vec2 starUV = vec2(atan(starRd.x, starRd.z) * 0.5, starRd.y);
    
    float gridRes = 350.0;
    vec2 gId = floor(starUV * gridRes);
    vec2 gUv = fract(starUV * gridRes) - 0.5;

    float baseHash = hash(gId);
    float densityFactor = isRef ? u_starDensity * 1.33 : u_starDensity;
    float starIntensity = exp2(densityFactor * 0.15 * log2(baseHash + 0.0001));
    
    float stars = starIntensity * smoothstep(0.02 + hash(gId + vec2(17.3, 89.7)) * 0.1, 0.0, length(gUv)) * 10.0;
    float twinkle = 0.55 + 0.45 * sin(u_time * (0.6 + hash(gId) * 2.0) + hash(gId) * 6.28);
    
    vec3 starColor = mix(vec3(0.75, 0.85, 1.0), vec3(1.0, 0.95, 0.8), hash(gId + vec2(137.2, 43.8)));
    return stars * twinkle * nightFactor * (isRef ? 0.25 : 1.0) * (1.0 - smoothstep(0.1, 0.7, u_warp)) * starColor;
}

float getClouds(vec3 rd, float t, bool isRef) {
    vec2 uv = rd.xz / (rd.y + 0.001) * 0.4;
    uv.x -= t * 0.05;      
    float f = noise(uv);
    if (!isRef) {
        uv = rotCloud * uv;
        f += 0.5 * noise(uv + t * 0.03);
        if (u_quality > 0.7) {
            f += 0.25 * noise(rotCloud * uv - t * 0.02) * u_detailFade;
        }
        f = smoothstep(0.65, 1.5, f);
    } else {
        f = smoothstep(0.4, 0.95, f);
    }
    return f * smoothstep(0.0, 0.15, rd.y);
}

void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / u_res.y;
    float t = u_time * 0.3;
    
    float shakeIntensity = u_warp * u_warp * u_warp * u_warp * u_warp * 0.04;
    uv += vec2(sin(u_time * 150.0), cos(u_time * 130.0)) * shakeIntensity;

    float solarEase = u_warp * u_warp * (3.0 - 2.0 * u_warp);
    float currentSunY = mix(0.15 + u_mouse.y * 1.0, -1.5, solarEase);
    vec3 sunDir = normalize(vec3(u_mouse.x * 1.5, currentSunY, 1.0));

            let lerpSpeed = 1.0 - Math.pow(0.85, dtFactor);
            mX += (targetMX - mX) * lerpSpeed; mY += (targetMY - mY) * lerpSpeed;

            let targetFade = isTouching ? 0.0 : 1.0;
            detailFade += (targetFade - detailFade) * (0.15 * dtFactor);

            totalFrames++;
            let analysisInterval = (totalFrames < 300) ? 20 : 60; 

            if (totalFrames > 30) {
                if (isTouching) { framesAnalyzed = 0; analysisStartTime = now; } 
                else if (framesAnalyzed >= analysisInterval) {
                    let elapsedAnalysis = now - analysisStartTime;
                    let actualFPS = (framesAnalyzed / elapsedAnalysis) * 1000;
                    if (actualFPS < 50 && currentDPR > 1.0) { currentDPR = Math.max(1.0, currentDPR - 0.2); resizeCanvas(); } 
                    else if (actualFPS > 58 && currentDPR < baseDPR) { currentDPR = Math.min(baseDPR, currentDPR + 0.1); resizeCanvas(); }
                    if (actualFPS < 45) globalQuality = Math.max(0.4, globalQuality - 0.2);
                    else if (actualFPS > 55) globalQuality = Math.min(1.0, globalQuality + 0.1);
                    framesAnalyzed = 0; analysisStartTime = now;
                }
                framesAnalyzed++;
            }

            let solarEase = warp * warp * (3.0 - 2.0 * warp);
            let currentSunY = 0.15 + mY * 1.0;
            let sunY = currentSunY * (1 - solarEase) + (-1.5) * solarEase;
            let dayFactor = Math.max(0, Math.min(1, (sunY + 0.02) / 0.17));
            let nightFactor = 1.0 - dayFactor;
            currentDayFactor = currentDayFactor + (dayFactor - currentDayFactor) * 0.05;
            currentNightFactor = currentNightFactor + (nightFactor - currentNightFactor) * 0.05;
            let isSunset = (sunY > -0.1 && sunY < 0.15) ? 1.0 : 0.0;
            let sunsetFactor = isSunset * (1.0 - Math.abs(sunY - 0.02) / 0.15);

            if (isW) {
                warp = Math.min(1.0, warp + (0.008 * dtFactor));
                if (warp >= 1.0 && !redirected) { redirected = true; window.location.href = TARGET; }
            } else if (!isMobile && audioInit && audioCtx && audioCtx.state === 'running') {
                let waveCycle = Math.sin(waveTime * 0.3);
                if (masterPanner && masterPanner.pan) { masterPanner.pan.setTargetAtTime(Math.max(-1.0, Math.min(1.0, mX * 0.8)), audioCtx.currentTime, 0.2); }
                if (waterFilter && waterGain) {
                    waterFilter.frequency.setTargetAtTime(Math.max(150, 250 + (waveCycle * 100) + (engineConfig.height * 600) - (mY * 150)), audioCtx.currentTime, 0.1);
                    waterSource.playbackRate.setTargetAtTime(Math.max(0.1, 0.4 + (engineConfig.energy * 0.02) + (waveCycle * 0.03)), audioCtx.currentTime, 0.1);
                    waterGain.gain.setTargetAtTime(0.12 + currentDayFactor * 0.08, audioCtx.currentTime, 0.3);
                }
                if (windFilter && windGain) { windFilter.frequency.setTargetAtTime(600 + currentDayFactor * 600 + sunsetFactor * 400, audioCtx.currentTime, 0.3); windGain.gain.setTargetAtTime(0.03 + currentDayFactor * 0.05 + sunsetFactor * 0.04, audioCtx.currentTime, 0.3); }
                if (ambientFilter && ambientGain) { ambientFilter.frequency.setTargetAtTime(1500 + currentDayFactor * 1000 - currentNightFactor * 500, audioCtx.currentTime, 0.5); ambientGain.gain.setTargetAtTime(0.03 + currentDayFactor * 0.03 + sunsetFactor * 0.04, audioCtx.currentTime, 0.3); }
                if (droneGain) { droneGain.gain.setTargetAtTime(0.02 + currentNightFactor * 0.04 + sunsetFactor * 0.02, audioCtx.currentTime, 0.5); }
            }

            let startupFactor = Math.max(0.0, 1.0 - (totalFrames / 120.0));

            gl.useProgram(prg);
            gl.uniform2f(uLocs.res, canvas.width, canvas.height);
            gl.uniform1f(uLocs.time, logicalTime * 0.001); 
            gl.uniform2f(uLocs.mouse, mX, mY);
            gl.uniform1f(uLocs.warp, warp);
            gl.uniform1f(uLocs.wTime, waveTime);
            gl.uniform3f(uLocs.wColor, engineConfig.r, engineConfig.g, engineConfig.b);
            gl.uniform1f(uLocs.wEnergy, engineConfig.energy);
            gl.uniform1f(uLocs.wHeight, engineConfig.height);
            gl.uniform1f(uLocs.sDensity, engineConfig.stars);
            gl.uniform1f(uLocs.quality, globalQuality);
            gl.uniform1f(uLocs.warmup, startupFactor);
            gl.uniform1f(uLocs.detailFade, detailFade);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }

        window.addEventListener('keydown', (e) => { if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 's') { e.preventDefault(); document.getElementById('auth-modal').style.display = 'flex'; document.getElementById('auth-input').value = ''; document.getElementById('auth-input').focus(); }});
        document.getElementById('auth-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') { const val = e.target.value.trim(); if (val === 'abcab123') { document.getElementById('auth-modal').style.display = 'none'; document.getElementById('custom-panel').style.display = 'flex'; e.target.value = ''; } else { e.target.style.color = '#ff4444'; setTimeout(() => e.target.style.color = '#fff', 600); } } });

        configKeys.forEach(k => { document.getElementById(`inp-${k}`).addEventListener('input', (e) => { const val = parseFloat(e.target.value); engineConfig[k] = val; try { localStorage.setItem('rahatil_engine_config', JSON.stringify(engineConfig)); } catch (err) { } }); });
        textKeys.forEach(k => { document.getElementById(`inp-${k}`).addEventListener('input', (e) => { engineConfig[k] = e.target.value; applyTextConfig(); try { localStorage.setItem('rahatil_engine_config', JSON.stringify(engineConfig)); } catch (err) { } }); });

        function resetAdminPanel() { localStorage.removeItem('rahatil_engine_config'); engineConfig = { ...defaultConfig }; syncUIWithConfig(); }
        function closeAdminPanel() { document.getElementById('custom-panel').style.display = 'none'; }
    </script>
</body>
