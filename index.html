<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAHATIL | TIDAL CONVERGENCE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;400&display=swap');

        body, html {
            margin: 0; padding: 0; overflow: hidden; background: #000;
            font-family: 'Inter', sans-serif; cursor: none;
            touch-action: none; -webkit-touch-callout: none; height: 100dvh;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        canvas {
            display: block; width: 100vw; height: 100vh;
            position: absolute; z-index: 1; filter: contrast(1.05); touch-action: none;
        }

        #intro-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 50; display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px); transition: opacity 1.5s ease, backdrop-filter 1.5s ease;
            cursor: pointer;
        }

        .intro-visual {
            width: 80px; height: 80px; border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; position: relative; animation: visual-pulse 2s ease-in-out infinite;
            margin-bottom: 40px;
        }

        .intro-visual::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; background: rgba(255, 255, 255, 0.8); border-radius: 50%;
            animation: sound-wave 1.5s ease-out infinite;
        }

        .intro-visual::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            animation: sound-wave-outer 1.5s ease-out infinite; animation-delay: 0.3s;
        }

        @keyframes visual-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 255, 255, 0.1); }
        }

        @keyframes sound-wave {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        @keyframes sound-wave-outer {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        .intro-text {
            color: #fff; font-size: 0.7rem; letter-spacing: 15px; text-transform: uppercase;
            animation: pulse-breath 2.5s infinite alternate ease-in-out;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.8); pointer-events: none; margin-bottom: 15px;
        }

        .intro-hint {
            color: rgba(255, 255, 255, 0.4); font-size: 0.55rem; letter-spacing: 4px;
            text-transform: uppercase; animation: hint-fade 3s ease-in-out infinite;
        }

        @keyframes pulse-breath {
            0% { opacity: 0.3; letter-spacing: 15px; }
            100% { opacity: 1; letter-spacing: 20px; }
        }

        @keyframes hint-fade {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        #ui-layer {
            position: relative; z-index: 10; height: 100vh; width: 100vw;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: none; transition: opacity 1.2s ease;
        }

        .brand-text { text-align: center; }

        h1 {
            font-weight: 100; letter-spacing: 35px; color: rgba(255, 252, 248, 0.95); margin: 0;
            font-size: 3.2rem; text-transform: uppercase;
            background: linear-gradient(110deg, rgba(255, 252, 248, 0.7) 0%, rgba(160, 235, 255, 0.95) 25%, rgba(255, 255, 255, 1) 50%, rgba(180, 255, 240, 0.95) 75%, rgba(255, 252, 248, 0.7) 100%);
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; text-shadow: 0 8px 40px rgba(0, 0, 5, 0.6), 0 0 30px var(--glow-1);
            animation: spectral-flow 6s linear infinite; will-change: background-position, text-shadow;
        }

        @keyframes spectral-flow {
            0% { background-position: 200% center; text-shadow: 0 8px 40px rgba(0, 0, 5, 0.6), 0 0 25px var(--glow-1); }
            50% { text-shadow: 0 8px 50px rgba(0, 0, 10, 0.7), 0 0 45px var(--glow-2), 0 0 25px var(--glow-3); }
            100% { background-position: 0% center; text-shadow: 0 8px 40px rgba(0, 0, 5, 0.6), 0 0 25px var(--glow-1); }
        }

        .btn-init {
            margin-top: 80px; pointer-events: auto; cursor: pointer; color: rgba(255, 252, 248, 0.9);
            font-size: 0.7rem; letter-spacing: 15px; text-transform: uppercase;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
            background: linear-gradient(90deg, rgba(255, 252, 248, 0.5) 0%, rgba(140, 255, 240, 0.95) 30%, rgba(255, 255, 255, 1) 50%, rgba(180, 215, 255, 0.95) 70%, rgba(255, 252, 248, 0.5) 100%);
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; text-shadow: 0 4px 15px rgba(0, 0, 8, 0.6), 0 0 15px var(--glow-3);
            animation: btn-glow-flow 4s linear infinite;
        }

        @keyframes btn-glow-flow {
            0% { background-position: 200% center; opacity: 0.6; text-shadow: 0 4px 15px rgba(0, 0, 8, 0.6), 0 0 10px var(--glow-3); }
            50% { opacity: 0.95; text-shadow: 0 4px 25px rgba(0, 0, 10, 0.7), 0 0 20px var(--glow-1), 0 0 10px var(--glow-2); }
            100% { background-position: 0% center; opacity: 0.6; text-shadow: 0 4px 15px rgba(0, 0, 8, 0.6), 0 0 10px var(--glow-3); }
        }

        .btn-init::after {
            content: ''; position: absolute; bottom: -10px; left: 25%; width: 50%; height: 1px;
            background: #fff; opacity: 0.2; transition: 0.4s;
        }

        .btn-init:hover {
            opacity: 1; letter-spacing: 20px; -webkit-text-fill-color: #fff;
            text-shadow: 0 0 40px var(--glow-active), 0 4px 20px rgba(0, 0, 0, 0.9); animation: none;
        }

        .btn-init:hover::after { width: 100%; left: 0; opacity: 1; }

        #swipe-hint {
            position: absolute; bottom: 12%; display: flex; flex-direction: column; align-items: center;
            opacity: 0; pointer-events: none; animation: hint-appear 2s ease forwards 2.5s;
        }

        .swipe-track { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent); margin-bottom: 10px; position: relative; }
        .swipe-dot {
            position: absolute; top: -1px; left: 0; width: 15px; height: 3px; border-radius: 2px;
            background: rgba(160, 235, 255, 0.95); box-shadow: 0 0 10px rgba(160, 235, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.5);
            animation: swipe-dot-move 2.5s ease-in-out infinite;
        }

        .swipe-text { color: rgba(255, 252, 248, 0.45); font-size: 0.55rem; letter-spacing: 6px; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8); }

        @keyframes swipe-dot-move {
            0% { left: 0%; opacity: 0; transform: translateX(-50%); }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { left: 100%; opacity: 0; transform: translateX(-50%); }
        }
        @keyframes hint-appear { to { opacity: 1; } }

        #cinematic-layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; gap: 20px; opacity: 0; transition: opacity 0.6s ease; width: 100%;
        }

        .cine-title {
            font-weight: 100; font-size: 2.2rem; color: rgba(255, 252, 248, 0.95); letter-spacing: 15px;
            text-transform: uppercase; text-shadow: 0 8px 35px rgba(0, 0, 10, 0.45), 0 0 30px rgba(220, 235, 255, 0.15);
            opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); text-align: center;
        }

        .cine-sub {
            font-size: 0.65rem; color: rgba(220, 225, 235, 0.85); letter-spacing: 12px;
            text-transform: uppercase; opacity: 0; transform: translateY(15px); transition: all 0.6s ease;
            text-align: center; text-shadow: 0 4px 15px rgba(0, 0, 5, 0.6);
        }

        #cinematic-layer.active { opacity: 1; }
        #cinematic-layer.active .cine-title { opacity: 1; transform: translateY(0); letter-spacing: 28px; transition-delay: 0.1s; }
        #cinematic-layer.active .cine-sub:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.4s; }
        #cinematic-layer.active .cine-sub:nth-child(3) { opacity: 1; transform: translateY(0); color: rgba(255, 252, 248, 0.95); transition-delay: 0.8s; }

        #cursor {
            position: fixed; pointer-events: none; z-index: 9999; width: 22px; height: 22px;
            border: 1.5px solid #fff; border-radius: 50%; transform: translate(-50%, -50%);
            mix-blend-mode: difference; transition: transform 0.2s ease;
        }

        /* TELEMETRY OVERLAY */
        #telemetry-layer {
            position: fixed; top: 15px; right: 15px; z-index: 10000;
            background: rgba(10, 10, 15, 0.85); border: 1px solid rgba(160, 235, 255, 0.2);
            border-radius: 6px; padding: 15px; color: #fff; font-family: monospace; font-size: 0.65rem;
            display: none; flex-direction: column; gap: 8px; backdrop-filter: blur(10px);
            pointer-events: none; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: opacity 0.3s;
        }
        .tel-row { display: flex; justify-content: space-between; gap: 25px; }
        .tel-lbl { color: #888; }
        .tel-val { color: #a0ebff; font-weight: bold; text-align: right;}

        .overlay-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9000;
            display: none; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px); pointer-events: auto;
        }

        #auth-input {
            background: transparent; border: none; border-bottom: 1px solid #fff; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 1.2rem; text-align: center; outline: none;
            letter-spacing: 5px; padding: 10px; width: 300px;
        }
        #auth-input::placeholder { color: rgba(255, 255, 255, 0.3); text-transform: uppercase; }

        .panel-box {
            background: rgba(10, 10, 15, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px;
            padding: 30px; width: 400px; max-width: 90%; max-height: 85vh; overflow-y: auto; color: #fff;
            font-family: 'Inter', sans-serif; box-shadow: 0 0 40px rgba(0, 0, 0, 0.8); display: flex;
            flex-direction: column; gap: 15px; box-sizing: border-box;
        }

        .panel-box::-webkit-scrollbar { width: 6px; }
        .panel-box::-webkit-scrollbar-track { background: transparent; }
        .panel-box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        .panel-box::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        .panel-box h3 { margin: 0 0 5px 0; font-weight: 100; letter-spacing: 8px; text-transform: uppercase; font-size: 1.2rem; text-align: center; color: #aaa; }
        .slider-group { display: flex; flex-direction: column; gap: 5px; }
        .slider-group label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #888; display: flex; justify-content: space-between; }
        .slider-group span { color: #fff; }
        
        input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #fff; cursor: pointer; margin-top: -7px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255, 255, 255, 0.2); border-radius: 1px; }

        .text-input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; font-family: 'Inter', sans-serif; font-size: 0.75rem; padding: 8px; width: 100%; border-radius: 4px; box-sizing: border-box; outline: none; transition: 0.3s; margin-top: 4px; }
        .text-input:focus { border-color: rgba(255, 255, 255, 0.7); background: rgba(0, 0, 0, 0.6); }

        .panel-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn-panel { flex: 1; padding: 12px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; font-family: 'Inter'; font-size: 0.65rem; transition: 0.3s; }
        .btn-panel:hover { background: rgba(255, 255, 255, 0.2); }
        .btn-reset { color: #ffa0a0; border-color: rgba(255, 100, 100, 0.3); }
        .btn-reset:hover { background: rgba(255, 100, 100, 0.15); border-color: rgba(255, 100, 100, 0.6); }
        .btn-deploy { background: rgba(74, 222, 128, 0.15); border-color: rgba(74, 222, 128, 0.4); color: #4ade80; }
        .btn-deploy:hover { background: rgba(74, 222, 128, 0.25); border-color: rgba(74, 222, 128, 0.7); }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; letter-spacing: 18px; margin-left: 18px; }
            .btn-init { font-size: 0.6rem; letter-spacing: 10px; margin-top: 50px; }
            .btn-init:hover { letter-spacing: 12px; }
            .cine-title { font-size: 1.5rem; letter-spacing: 8px; }
            .cine-sub { font-size: 0.5rem; letter-spacing: 6px; }
            #cinematic-layer.active .cine-title { letter-spacing: 15px; }
            .panel-box { padding: 20px; gap: 12px; }
            .panel-box h3 { font-size: 1rem; letter-spacing: 5px; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            h1 { font-size: 1.8rem; letter-spacing: 12px; }
            .btn-init { margin-top: 30px; font-size: 0.55rem; letter-spacing: 8px; }
            .panel-box { padding: 15px; gap: 8px; }
            .slider-group label { font-size: 0.6rem; }
            #swipe-hint { bottom: 5%; }
        }
    </style>
</head>

<body>
    <div id="cursor"></div>
    <canvas id="v"></canvas>

    <div id="telemetry-layer">
        <div class="tel-row"><span class="tel-lbl">ENGINE</span><span class="tel-val">TIDAL CORE</span></div>
        <div class="tel-row"><span class="tel-lbl">THREAD</span><span class="tel-val" id="tel-renderer">W-WORKER</span></div>
        <div class="tel-row"><span class="tel-lbl">FPS</span><span class="tel-val" id="tel-fps">00</span></div>
        <div class="tel-row"><span class="tel-lbl">LATENCY</span><span class="tel-val" id="tel-lat">0.0ms</span></div>
        <div class="tel-row"><span class="tel-lbl">FBO RES</span><span class="tel-val" id="tel-res">0x0</span></div>
        <div class="tel-row"><span class="tel-lbl">HDR BLOOM</span><span class="tel-val" id="tel-hdr">OFF</span></div>
        <div class="tel-row"><span class="tel-lbl">DRS TIER</span><span class="tel-val" id="tel-drs">T4</span></div>

    <div id="intro-layer" onclick="window.enterExperience()">
        <div class="intro-visual"></div>
        <div class="intro-text">Click to Begin</div>
        <div class="intro-hint">Enable Audio Experience</div>
    </div>

    <div id="ui-layer">
        <div class="brand-text">
            <h1 id="ui-mainTitle">RAHATIL</h1>
            <div class="btn-init" id="ui-btnText" onclick="engage()">Initialize</div>
        </div>
        
        <div id="swipe-hint">
            <div class="swipe-track"><div class="swipe-dot"></div></div>
            <div class="swipe-text">Swipe to explore</div>
        </div>
    </div>

    <div id="cinematic-layer">
        <div class="cine-title" id="ui-cineTitle">Welcome, Rahatil</div>
        <div class="cine-sub" id="ui-cineSub1">Calibrating Tidal Engine...</div>
        <div class="cine-sub" id="ui-cineSub2">Redirecting to Terminal</div>
    </div>

    <div id="auth-modal" class="overlay-layer">
        <input type="password" id="auth-input" placeholder="OVERRIDE CODE" autocomplete="off" />
    </div>

    <div id="custom-panel" class="overlay-layer">
        <div class="panel-box">
            <h3>Engine Override</h3>

            <div class="slider-group">
                <label>Wave Energy <span id="val-energy">2.2</span></label>
                <input type="range" id="inp-energy" min="0" max="10" step="0.1" value="2.2">
            </div>
            <div class="slider-group">
                <label>Wave Height <span id="val-height">0.05</span></label>
                <input type="range" id="inp-height" min="0" max="0.5" step="0.01" value="0.05">
            </div>
            <div class="slider-group">
                <label>Star Density (Lower = More) <span id="val-stars">600</span></label>
                <input type="range" id="inp-stars" min="100" max="1500" step="10" value="600">
            </div>
            <div class="slider-group">
                <label>Water Red <span id="val-r">0.01</span></label>
                <input type="range" id="inp-r" min="0" max="1" step="0.01" value="0.01">
            </div>
            <div class="slider-group">
                <label>Water Green <span id="val-g">0.04</span></label>
                <input type="range" id="inp-g" min="0" max="1" step="0.01" value="0.04">
            </div>
            <div class="slider-group">
                <label>Water Blue <span id="val-b">0.08</span></label>
                <input type="range" id="inp-b" min="0" max="1" step="0.01" value="0.08">
            </div>

            <h3 style="margin-top: 15px; font-size: 1rem;">System Text & Links</h3>
            <div class="slider-group"><label>Main Title</label><input type="text" id="inp-mainTitle" class="text-input"></div>
            <div class="slider-group"><label>Button Action</label><input type="text" id="inp-btnText" class="text-input"></div>
            <div class="slider-group"><label>Cinematic Title</label><input type="text" id="inp-cineTitle" class="text-input"></div>
            <div class="slider-group"><label>Subtext 1</label><input type="text" id="inp-cineSub1" class="text-input"></div>
            <div class="slider-group"><label>Subtext 2</label><input type="text" id="inp-cineSub2" class="text-input"></div>
            <div class="slider-group"><label>Redirect URL</label><input type="text" id="inp-targetUrl" class="text-input"></div>

            <div class="panel-buttons">
                <button class="btn-panel btn-reset" onclick="resetAdminPanel()">Reset</button>
                <button class="btn-panel btn-deploy" onclick="showDeployPanel()">☁️ Deploy</button>
            </div>
            <div class="panel-buttons">
                <button class="btn-panel" onclick="closeAdminPanel()">Sync & Close</button>
            </div>
        </div>
    </div>

    <!-- MAIN SHADER PAYLOAD (RAW HDR OUTPUT) -->
    <script id="fs" type="x-shader/x-fragment">#version 300 es
#ifdef GL_FRAGMENT_PRECISION_HIGH
precision highp float;
#else
precision mediump float;
#endif

out vec4 fragColor;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_mouse;
uniform float u_warp;
uniform float u_waveTime;

uniform vec3 u_waterColor;
uniform float u_waveEnergy;
uniform float u_waveHeight;
uniform float u_starDensity;

uniform float u_drsTier;     
uniform float u_isMobile; 
uniform float u_warmup; 
uniform float u_detailFade; 

uniform sampler2D u_cloudLUT;

#define PI_2 6.28318530718

const mat2 rotMicro = mat2(0.8, -0.6, 0.6, 0.8);
const mat2 rotCloud = mat2(1.6, 1.2, -1.2, 1.6);

float hash(vec2 p) { 
    p = mod(p, 289.0); 
    return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); 
}

float noise(vec2 p) {
    vec2 i = floor(p); vec2 f = fract(p);
    vec2 u = f*f*(3.0-2.0*f);
    return mix(mix(hash(i), hash(i+vec2(1,0)), u.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
}

float GetWaterHeight(vec3 p, bool micro) {
    float t = u_waveTime;
    vec2 uv = p.xz * 0.75;
    
    float nVal = 0.5;
    if (micro && u_drsTier > 1.5) {
        nVal = noise(uv * 0.3 + t * 0.1) * (1.0 - u_warmup);
    }
    
    vec3 dots = mod(vec3(
        dot(uv, vec2(0.64018, 0.76822)) * 1.5 + t * 0.8,
        dot(uv, vec2(-0.78086, 0.62469)) * 2.8 - t * 1.2,
        dot(uv, vec2(0.19611, -0.98058)) * 5.0 + t * 1.5
    ), PI_2);
    vec3 sines = sin(dots) * 0.5 + 0.5;
    vec3 amps = vec3(1.5 * (0.85 + 0.3 * nVal), 0.8, 0.4) * u_waveHeight;
    float h = dot(sines * sines, amps);
    
    if (u_drsTier > 0.5) {
        vec2 dots2 = mod(vec2(
            dot(uv, vec2(-0.8137, -0.5812)) * 3.5 + t * 0.6,
            dot(uv, vec2(0.9486, -0.3162)) * 8.0 - t * 2.0
        ), PI_2);
        vec2 sines2 = sin(dots2) * 0.5 + 0.5;
        vec2 amps2 = vec2(0.25 * (0.8 + 0.4 * nVal), 0.15) * u_waveHeight;
        h += dot(sines2 * sines2, amps2);
    }

    if(micro && u_drsTier > 2.5 && u_detailFade > 0.01) {
        vec2 uv1 = rotMicro * uv * 8.0;
        h += (noise(uv1 + t) * 0.5) * (u_waveHeight * 0.18) * u_detailFade * (1.0 - u_warmup);
    }
    return h - (u_waveHeight * 0.5);
}

vec3 GetNormal(vec3 p, bool micro) {
    vec2 e = vec2(0.02, 0.0);
    float h = GetWaterHeight(p, micro);
    float naturalY = 0.04 + (u_waveHeight * 0.4); 
    return normalize(vec3(
        h - GetWaterHeight(p - e.xyy, false), 
        naturalY, 
        h - GetWaterHeight(p - e.yyx, false)
    ));
}

vec3 GetStars(vec3 rd, float nightFactor, bool isRef) {
    if (u_drsTier < 0.5 && isRef) return vec3(0.0);
    vec3 starRd = isRef ? normalize(vec3(rd.x, abs(rd.y), rd.z)) : rd;
    vec2 starUV = vec2(atan(starRd.x, starRd.z) * 0.5, starRd.y);
    float gridRes = 350.0;
    vec2 gId = floor(starUV * gridRes);
    vec2 gUv = fract(starUV * gridRes) - 0.5;
    float baseHash = hash(gId);
    float densityFactor = isRef ? u_starDensity * 1.33 : u_starDensity;
    float starIntensity = exp2(densityFactor * 0.15 * log2(baseHash + 0.0001));
    float starSize = 0.02 + hash(gId + vec2(17.3, 89.7)) * 0.1;
    float starShape = smoothstep(starSize, 0.0, length(gUv));
    float stars = starIntensity * starShape * 10.0;
    float starPhase = hash(gId + vec2(45.2, 12.8)) * 6.28318;
    float starFreq = 0.6 + hash(gId + vec2(9.3, 74.1)) * 2.0;
    float twinkle = 0.55 + 0.45 * sin(u_time * starFreq + starPhase);
    float colorSeed = hash(gId + vec2(137.2, 43.8));
    vec3 starColor = mix(vec3(0.75, 0.85, 1.0), vec3(1.0, 0.95, 0.8), colorSeed);
    starColor = mix(starColor, vec3(1.0, 0.8, 0.6), colorSeed * colorSeed * 0.25);
    float warpFade = 1.0 - smoothstep(0.1, 0.7, u_warp);
    float refMult = isRef ? 0.25 : 1.0;
    return stars * twinkle * nightFactor * refMult * warpFade * starColor;
}

vec3 GetMeteors(vec3 rd, float nightFactor) {
    if (u_drsTier < 1.5 || nightFactor < 0.05 || u_warp > 0.3) return vec3(0.0);
    vec3 meteorColor = vec3(0.0);
    float seedBase = floor(u_time * 0.15);
    for (int i = 0; i < 2; i++) {
        float seed = hash(vec2(seedBase + float(i) * 17.0, float(i) * 31.0));
        if (seed < 0.72) continue;
        float progress = fract(u_time * 0.1 + seed * 7.0);
        if (progress < 0.08 || progress > 0.85) continue;
        float sx = -2.0 + seed * 4.0;
        float ang = -0.3 - seed * 0.4;
        float px = sx + progress * 3.0 * cos(ang);
        float py = 0.5 + progress * 1.8 * sin(ang);
        vec2 sUV = vec2(atan(rd.x, rd.z) * 0.5, rd.y);
        float d = length(sUV - vec2(px, py));
        float g = smoothstep(0.1, 0.0, d);
        float fi2 = smoothstep(0.0, 0.2, progress);
        float fo2 = 1.0 - smoothstep(0.6, 1.0, progress);
        vec3 c = mix(vec3(0.7, 0.8, 1.0), vec3(1.0, 0.9, 0.7), seed);
        meteorColor += c * g * fi2 * fo2 * nightFactor * 1.2;
    }
    return meteorColor;
}

float getClouds(vec3 rd, float t, bool isRef) {
    if (u_drsTier < 0.5) return 0.0;
    vec2 uv = rd.xz / (abs(rd.y) + 0.001) * 0.15;
    uv.x -= t * 0.025;      
    
    float f = texture(u_cloudLUT, uv).r;
    if (!isRef) {
        if (u_drsTier > 1.5) { 
            uv = rotCloud * uv;
            f += 0.5 * texture(u_cloudLUT, uv + t * 0.015).r;
        }
        if (u_drsTier > 2.5 && u_detailFade > 0.01 && u_isMobile < 0.5) { 
            uv = rotCloud * uv;
            f += 0.25 * texture(u_cloudLUT, (uv - t * 0.01) * 2.0).r * u_detailFade;
        }
        f = smoothstep(0.45, 1.3, f);
    } else {
        f = smoothstep(0.35, 0.95, f); 
    }
    return f * smoothstep(0.0, 0.15, abs(rd.y));
}

vec3 getCloudColor(vec3 rd, vec3 sunDir) {
    vec3 cloudDay = vec3(0.95, 0.98, 1.0);
    vec3 cloudSunset = vec3(1.0, 0.4, 0.15);
    vec3 cloudNight = vec3(0.01, 0.015, 0.03);      
    float cloudDayFact = smoothstep(-0.1, 0.15, sunDir.y);
    vec3 cColor = mix(cloudNight, mix(cloudSunset, cloudDay, smoothstep(-0.05, 0.25, sunDir.y)), cloudDayFact);
    float sDot = max(0.0, dot(rd, sunDir));
    cColor += vec3(1.0, 0.6, 0.2) * exp2(5.0 * log2(sDot + 0.0001)) * smoothstep(-0.1, 0.3, sunDir.y) * 0.5;
    return cColor;
}

void main() {

    vec3 sunDir = normalize(vec3(u_mouse.x * 1.5, currentSunY, 1.0));
    vec3 moonDir = normalize(vec3(-u_mouse.x * 1.5, -currentSunY - 0.1, 1.0));

    vec3 rd = normalize(vec3(uv.x, uv.y - 0.1, 1.1 + u_warp * 0.6));  
    
    float dayFactor = smoothstep(-0.02, 0.15, sunDir.y);
    float nightFactor = 1.0 - dayFactor;
    float trueNight = smoothstep(-0.02, -0.15, sunDir.y);
    
    vec3 nightZenith = vec3(0.0, 0.0005, 0.002); 
    vec3 nightHorizon = vec3(0.001, 0.004, 0.012);
    vec3 dayZenith = vec3(0.05, 0.15, 0.4);     
    vec3 dayHorizon = vec3(0.35, 0.65, 0.85); 
    vec3 sunsetHorizon = vec3(1.0, 0.35, 0.1);    
    
    vec3 zenith = mix(nightZenith, dayZenith, dayFactor);
    vec3 horizon = mix(nightHorizon, mix(sunsetHorizon, dayHorizon, smoothstep(0.0, 0.4, sunDir.y)), dayFactor);
    
    float sunsetGlow = smoothstep(-0.15, 0.1, sunDir.y) * smoothstep(0.4, -0.05, sunDir.y);
    horizon += vec3(1.0, 0.4, 0.1) * sunsetGlow * pow(max(0.0, dot(rd, sunDir)), 1.5);
    
    vec3 col = mix(horizon, zenith, smoothstep(-0.2, 0.6, rd.y));
    float sunMask = smoothstep(-0.05, 0.02, sunDir.y);
    float moonMask = smoothstep(-0.05, 0.02, moonDir.y);
    
    float sunDot = max(0.0, dot(rd, sunDir));
    float moonDot = max(0.0, dot(rd, moonDir));
    bool skipSky = (sunDot > 0.9998 && sunDir.y > -0.05) || (moonDot > 0.9998 && moonDir.y > -0.05);

    if (rd.y >= 0.0 && !skipSky) {
        if(trueNight > 0.05) {
            if (u_drsTier > 0.5) { 
                vec2 nebUV = rd.xz / (abs(rd.y) + 0.001);
                float neb = texture(u_cloudLUT, nebUV * 0.05 + u_time * 0.002).r;
                if (u_isMobile < 0.5) neb *= texture(u_cloudLUT, nebUV * 0.1 - u_time * 0.002).r;
                else neb = neb * neb; 
                
                col += vec3(0.08, 0.03, 0.12) * neb * trueNight * smoothstep(0.0, 0.3, rd.y) * 0.6 * (1.0 - smoothstep(0.2, 0.8, u_warp));
            }

            col += GetMeteors(rd, trueNight) * smoothstep(-0.1, 0.15, rd.y);

        vec3 glowColor = mix(vec3(1.0, 0.25, 0.05), vec3(1.0, 0.8, 0.5), smoothstep(0.0, 0.4, sunAltD));

        cinematicSun += glowColor * (exp2(180.0 * log2(sunDot + 0.0001)) * 1.5);            
        cinematicSun += mix(vec3(1.0, 0.1, 0.0), glowColor, 0.5) * (exp2(12.0 * log2(sunDot + 0.0001)) * 0.4);
        col += cinematicSun * sunMask;
        
        vec3 moonRight = normalize(cross(vec3(0.0, 1.0, 0.0), moonDir));

        vec2 moonUV = vec2(dot(rd, moonRight), dot(rd, moonUp)) * 45.0;
        
        float craters = 0.5;
        if (u_drsTier > 1.5 && moonDot > 0.998) craters = noise(moonUV * 8.0) * 0.6 + noise(moonUV * 20.0) * 0.4;
        
        vec3 moonSurface = mix(vec3(0.5, 0.55, 0.6), vec3(1.0, 0.98, 0.95), craters);
        float moonDist = clamp((1.0 - moonDot) / (1.0 - 0.9993), 0.0, 1.0);
        
        vec3 cinematicMoon = moonSurface * sqrt(1.0 - moonDist * moonDist) * smoothstep(0.9993, 0.99945, moonDot) * 2.2; 
        cinematicMoon += vec3(0.7, 0.85, 1.0) * (exp2(250.0 * log2(moonDot + 0.0001)) * 1.2 + exp2(70.0 * log2(moonDot + 0.0001)) * 0.5);

        // Contextual Termination: Hard Cutoff for heavily fogged pixels (saves millions of ALUs)
        if (mistFade > 0.99) {
            col = mix(horizon, vec3(0.0), trueNight * 0.3);
        } else {
            vec3 p = ro + rd * d;
            
            float hOffset = GetWaterHeight(p, false);
            p += rd * (hOffset / max(abs(rd.y), 0.05));
            
            float waveLocalH = GetWaterHeight(p, false);
            
            // Adaptive Detail Material Iteration
            vec3 N_smooth = GetNormal(p, false);
            vec3 N_sharp = N_smooth;
            if (d < 120.0) {
                N_sharp = GetNormal(p, true);
            }
            
            vec3 N_spec = normalize(mix(N_smooth, N_sharp, smoothstep(120.0, 50.0, d) * 0.9)); 
            vec3 refR_Planar = reflect(rd, N_smooth); 
            vec3 reflectedSky = mix(horizon, zenith, smoothstep(-0.2, 0.6, refR_Planar.y));
            
            // Volumetric Reflection Gate Cutoff (Saves evaluating reflections on distant waves)
            if (d < 150.0) {
                if(trueNight > 0.05 && u_drsTier > 1.5) {
                    if (u_isMobile < 0.5) reflectedSky += vec3(0.04, 0.015, 0.06) * texture(u_cloudLUT, refR_Planar.xz * 0.1).r * trueNight * smoothstep(0.0, 0.3, refR_Planar.y);
                    reflectedSky += GetStars(refR_Planar, trueNight, true);
                }

                if (u_drsTier > 2.5) { 
                    float refCloudAlpha = getClouds(refR_Planar, u_time, true);
                    if(refCloudAlpha > 0.0) reflectedSky = mix(reflectedSky, getCloudColor(refR_Planar, sunDir), refCloudAlpha * 0.55);
                }
            }

            float fresnel = exp2(5.0 * log2(1.0 - max(0.0, dot(-rd, N_sharp)) + 0.0001));
            vec3 tidalColor = mix(u_waterColor * 0.2, u_waterColor * 2.2, smoothstep(-u_waveHeight, u_waveHeight * 1.5, waveLocalH));
            vec3 nightWater = mix(vec3(0.000, 0.001, 0.003) + tidalColor * 0.05, vec3(0.015, 0.035, 0.085) + tidalColor * 0.25, max(0.0, moonDir.y));
            vec3 waterBase = mix(nightWater, tidalColor, dayFactor);
            vec3 waterCol = mix(waterBase, reflectedSky * 0.85, 0.15 + 0.85 * fresnel);
            vec3 waterSunDir = normalize(vec3(sunDir.x, max(sunDir.y, 0.001), sunDir.z));
            vec3 waterMoonDir = normalize(vec3(moonDir.x, max(moonDir.y, 0.001), moonDir.z));

            float specPower = u_drsTier < 1.5 ? 150.0 : (u_isMobile > 0.5 ? 250.0 : 400.0);
            float sunSpecMult = u_isMobile > 0.5 ? 1.2 : 4.5;
            float moonSpecMult = u_isMobile > 0.5 ? 0.8 : 2.5;
            float smoothSpecMult = u_isMobile > 0.5 ? 0.2 : 0.8;

            float smoothSpecDot = max(0.0, dot(N_smooth, normalize(-rd + waterSunDir)));
            float specTermSun = exp2(specPower * log2(max(0.0, dot(N_spec, normalize(-rd + waterSunDir))) + 0.0001)) * sunSpecMult + exp2(80.0 * log2(smoothSpecDot + 0.0001)) * smoothSpecMult;
            waterCol += mix(vec3(1.0, 0.3, 0.05), vec3(1.0, 0.9, 0.7), smoothstep(0.0, 0.3, waterSunDir.y)) * specTermSun * sunMask;
            
            float smoothMoonSpecDot = max(0.0, dot(N_smooth, normalize(-rd + waterMoonDir)));
            float moonSpecIntensity = exp2((specPower + 100.0) * log2(max(0.0, dot(N_spec, normalize(-rd + waterMoonDir))) + 0.0001)) * moonSpecMult + exp2(80.0 * log2(smoothMoonSpecDot + 0.0001)) * smoothSpecMult;
            waterCol += vec3(0.5, 0.65, 0.85) * moonSpecIntensity * trueNight * moonMask;
            
            float diffuseMoon = max(0.0, dot(N_smooth, waterMoonDir));
            waterCol += (vec3(0.02, 0.028, 0.05) + tidalColor * 0.15) * (diffuseMoon * 0.4) * trueNight;
            
            vec3 mistColor = mix(horizon, vec3(0.0), trueNight * 0.3);
            col = mix(waterCol, mistColor, mistFade);
        }
    }

    if (u_drsTier > 0.5) { 
        float hyperGlow = pow(u_warp, 3.5) * 2.5;
        float caSplit = u_warp * length(uv) * 1.5;
        col += vec3(0.85, 0.95, 1.0) * hyperGlow + vec3(caSplit, 0.0, -caSplit) * u_warp * 1.5;
    }

    fragColor = vec4(col, 1.0);
}</script>

            function applyDRSTier() {
                let newDPR = currentDPR;
                if (isMobile) {
                    if (drsTier >= 3) newDPR = baseDPR; 
                    else if (drsTier === 2) newDPR = Math.max(1.0, baseDPR * 0.8); 
                    else if (drsTier === 1) newDPR = Math.max(0.75, baseDPR * 0.6); 
                    else newDPR = 0.5; 
                } else newDPR = baseDPR;
                
                if (Math.abs(newDPR - currentDPR) > 0.01) {

            function render(now) {
                if (isPaused) { ctx.requestAnimationFrame(render); return; }

                totalFrames++; 
                let elapsed = now - (lastTime || now);
                if (elapsed > 100) elapsed = 16.666; 
                lastTime = now;

                let dtJS = elapsed; if (drsTier === 0) dtJS *= 0.5; 
                waveTime += (dtJS * 0.001) * engineConfig.energy;
                let dtFactor = dtJS / 16.666;
                
                let lerpFactor = isMobile ? 0.35 : 0.12; 
                let lerpSpeed = 1.0 - Math.pow(1.0 - lerpFactor, dtFactor);
                mX += (targetMX - mX) * lerpSpeed; mY += (targetMY - mY) * lerpSpeed;
                detailFade += ((isTouching ? 0.0 : 1.0) - detailFade) * (0.15 * dtFactor);

                if (drsCooldown > 0) drsCooldown--;

                    if (drsCount === DRS_HISTORY_SIZE) drsSum -= frameTimes[drsIndex]; else drsCount++;
                    frameTimes[drsIndex] = elapsed; drsSum += elapsed; drsIndex = (drsIndex + 1) % DRS_HISTORY_SIZE;
                    if (drsCount === DRS_HISTORY_SIZE && drsCooldown <= 0) {
                        let fps = 1000 / (drsSum / DRS_HISTORY_SIZE); let oldTier = drsTier;
                        if (fps < 48 && drsTier > 0) { drsTier--; drsCooldown = 90; if (isMobile) mobileThermalLock = true; }
                        else if (fps >= 58 && drsTier < (isMobile ? 3 : 4) && !mobileThermalLock) { drsTier++; drsCooldown = 90; }
                        if (oldTier !== drsTier) { applyDRSTier(); drsCount = 0; drsSum = 0; }
                    }
                }
                
                if (totalFrames % 30 === 0) {
                    let calcFps = Math.round(1000 / (drsSum / DRS_HISTORY_SIZE || 16.666));
                    let calcLat = Math.round(elapsed * 10) / 10;
                    ctx.postMessage({ type: 'TELEMETRY', fps: calcFps, latency: calcLat, w: rtMain.w, h: rtMain.h, drsTier, hdr: hasFloat });
                }

                if (isW) warp = Math.min(1.0, warp + (0.008 * dtFactor));
                
                gl.bindFramebuffer(gl.FRAMEBUFFER, rtMain.fb);
                gl.viewport(0, 0, rtMain.w, rtMain.h);
                gl.useProgram(prg);
                gl.uniform2f(uLocs.res, rtMain.w, rtMain.h); gl.uniform1f(uLocs.time, now * 0.001);
                gl.uniform2f(uLocs.mouse, mX, mY); gl.uniform1f(uLocs.warp, warp);
                gl.uniform1f(uLocs.wTime, waveTime); gl.uniform3f(uLocs.wColor, engineConfig.r, engineConfig.g, engineConfig.b);
                gl.uniform1f(uLocs.wEnergy, engineConfig.energy); gl.uniform1f(uLocs.wHeight, engineConfig.height);
                gl.uniform1f(uLocs.sDensity, engineConfig.stars); gl.uniform1f(uLocs.isMobile, isMobile ? 1.0 : 0.0);
                gl.uniform1f(uLocs.warmup, Math.max(0.0, 1.0 - (totalFrames / 120.0)));

        function buildAudioGraph() {
            if (isMobile) return;
            const bufferSize = Math.floor(audioCtx.sampleRate * 0.8);
            if (audioCtx.createStereoPanner) { try { masterPanner = audioCtx.createStereoPanner(); masterPanner.pan.value = 0; masterPanner.connect(audioCtx.destination); } catch(e){} }
            let audioDest = masterPanner ? masterPanner : audioCtx.destination;
            
            setTimeout(() => {
                const b = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); const o = b.getChannelData(0); let l = 0;
                for(let i=0; i<bufferSize; i++) { o[i] = (l + (0.02 * (Math.random()*2-1)))/1.02; l = o[i]; o[i] *= 3.5; }
                waterSource = audioCtx.createBufferSource(); waterSource.buffer = b; waterSource.loop = true;
                waterFilter = audioCtx.createBiquadFilter(); waterFilter.type = 'lowpass'; waterFilter.frequency.value = 400;
                waterGain = audioCtx.createGain(); waterGain.gain.value = 0.0;
                waterSource.connect(waterFilter).connect(waterGain).connect(audioDest); waterSource.start(0);
                waterGain.gain.setTargetAtTime(0.15, audioCtx.currentTime, 2.0);
            }, 0);

            setTimeout(() => {
                const windBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const windOut = windBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { windOut[i] = (Math.random() * 2 - 1) * 0.5; }
                windSource = audioCtx.createBufferSource();

                windFilter = audioCtx.createBiquadFilter();
                windFilter.type = 'bandpass'; windFilter.frequency.value = 800; windFilter.Q.value = 0.3;
                windGain = audioCtx.createGain(); windGain.gain.value = 0.0;
                windSource.connect(windFilter).connect(windGain).connect(audioDest);
                windSource.start(0);
                windGain.gain.setTargetAtTime(0.06, audioCtx.currentTime, 2.5);
            }, 100);

            setTimeout(() => {
                const ambientBuffer = audioCtx.createBuffer(2, bufferSize, audioCtx.sampleRate);
                for (let c = 0; c < 2; c++) {
                    const ambOut = ambientBuffer.getChannelData(c);
                    for (let i = 0; i < bufferSize; i++) {
                        let t = i / audioCtx.sampleRate;
                        let pad = Math.sin(t * 55 * Math.PI * 2) * 0.1 + Math.sin(t * 82.5 * Math.PI * 2) * 0.08 + Math.sin(t * 110 * Math.PI * 2) * 0.06;
                        ambOut[i] = (pad * 0.3) + (Math.random() * 2 - 1) * 0.02;
                    }
                }
                ambientSource = audioCtx.createBufferSource();
                ambientSource.buffer = ambientBuffer; ambientSource.loop = true;
                ambientFilter = audioCtx.createBiquadFilter();
                ambientFilter.type = 'lowpass'; ambientFilter.frequency.value = 2000;
                ambientGain = audioCtx.createGain(); ambientGain.gain.value = 0.0;
                ambientSource.connect(ambientFilter).connect(ambientGain).connect(audioDest);
                ambientSource.start(0);

            setTimeout(() => {

                const droneOsc2 = audioCtx.createOscillator(); droneOsc2.type = 'sine'; droneOsc2.frequency.value = 60;
                const droneOsc3 = audioCtx.createOscillator(); droneOsc3.type = 'triangle'; droneOsc3.frequency.value = 80;
                droneGain = audioCtx.createGain(); droneGain.gain.value = 0.0;
                const droneFilter = audioCtx.createBiquadFilter(); droneFilter.type = 'lowpass'; droneFilter.frequency.value = 100;
                droneOsc.connect(droneGain); droneOsc2.connect(droneGain); droneOsc3.connect(droneGain);
                droneGain.connect(droneFilter).connect(audioDest);
                droneOsc.start(0); droneOsc2.start(0); droneOsc3.start(0);
                droneGain.gain.setTargetAtTime(0.03, audioCtx.currentTime, 3.0);

        }

        function unlockAudio() {
            if (isMobile || audioInit) return; audioInit = true;
            const AC = window.AudioContext || window.webkitAudioContext; audioCtx = new AC();
            try { const b = audioCtx.createBuffer(1, 1, 22050); const s = audioCtx.createBufferSource(); s.buffer = b; s.connect(audioCtx.destination); if(s.start) s.start(0); } catch(e){}

        function updateAudioLogic(wMX, wMY, wTime, wWarp) {
            if (!audioInit || !audioCtx || audioCtx.state !== 'running' || isW) return;
            let solarEase = wWarp * wWarp * (3.0 - 2.0 * wWarp);
            let currentSunY = 0.15 + wMY * 1.0;
            let sunY = currentSunY * (1 - solarEase) + (-1.5) * solarEase;
            let dayFactor = Math.max(0, Math.min(1, (sunY + 0.02) / 0.17));
            currentDayFactor += (dayFactor - currentDayFactor) * 0.05;
            currentNightFactor += ((1.0 - dayFactor) - currentNightFactor) * 0.05;
            
            let isSunset = (sunY > -0.1 && sunY < 0.15) ? 1.0 : 0.0;
            let sunsetFactor = isSunset * (1.0 - Math.abs(sunY - 0.02) / 0.15);

            if (masterPanner) masterPanner.pan.setTargetAtTime(Math.max(-1.0, Math.min(1.0, wMX * 0.8)), audioCtx.currentTime, 0.2);
            
            if (waterFilter && waterGain && waterSource) {

                waterSource.playbackRate.setTargetAtTime(Math.max(0.1, 0.4 + (engineConfig.energy * 0.02) + (waveCycle * 0.03)), audioCtx.currentTime, 0.1);
                waterGain.gain.setTargetAtTime(0.12 + currentDayFactor * 0.08, audioCtx.currentTime, 0.3);
            }
            if (windFilter && windGain) {

                windGain.gain.setTargetAtTime(0.03 + currentDayFactor * 0.05 + sunsetFactor * 0.04, audioCtx.currentTime, 0.3);
            }
            if (ambientFilter && ambientGain) {
                ambientFilter.frequency.setTargetAtTime(1500 + currentDayFactor * 1000 - currentNightFactor * 500, audioCtx.currentTime, 0.5);
                ambientGain.gain.setTargetAtTime(0.03 + currentDayFactor * 0.03 + sunsetFactor * 0.04, audioCtx.currentTime, 0.3);
            }
            if (droneGain) {
                droneGain.gain.setTargetAtTime(0.02 + currentNightFactor * 0.04 + sunsetFactor * 0.02, audioCtx.currentTime, 0.5);
            }
        }

        textKeys.forEach(k => {
            document.getElementById(`inp-${k}`).addEventListener('input', (e) => {
                engineConfig[k] = e.target.value; applyTextConfig(); syncEngine(); try { localStorage.setItem('rahatil_engine_config', JSON.stringify(engineConfig)); } catch (err) { }
            });
        });

        // Keybind Overrides
        window.addEventListener('keydown', (e) => { 
            // Control Panel
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 's') { e.preventDefault(); document.getElementById('auth-modal').style.display = 'flex'; document.getElementById('auth-input').value = ''; document.getElementById('auth-input').focus(); } 
            
            // Telemetry Display Toggle
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'h') { 
                e.preventDefault(); 
                const tel = document.getElementById('telemetry-layer'); 
                tel.style.display = tel.style.display === 'flex' ? 'none' : 'flex'; 
            }
        });

        document.getElementById('auth-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { if (e.target.value.trim() === 'abcab123') { document.getElementById('auth-modal').style.display = 'none'; document.getElementById('custom-panel').style.display = 'flex'; e.target.value = ''; } else { e.target.style.color = '#ff4444'; setTimeout(() => e.target.style.color = '#fff', 600); } }
        });

        function resetAdminPanel() { localStorage.removeItem('rahatil_engine_config'); engineConfig = { ...defaultConfig }; applyTextConfig(); syncEngine(); location.reload(); }
        function closeAdminPanel() { document.getElementById('custom-panel').style.display = 'none'; }
    </script>
</body>
</html>
